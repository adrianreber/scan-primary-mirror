name: ci

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5
    - name: Install dependencies
      run: sudo apt-get update && sudo apt-get install -y bats
    - name: Run tests
      run: bats tests/test_cargo.bats
